<section class="contact">

<h1>Contact Us</h1>

<form id="contactForm">

<input
type="text"
placeholder="Your Name"
required>

type="email"
placeholder="Your Email"
required>

type="text"
placeholder="Subject"
required>

<textarea
placeholder="Write your message..."
rows="6"
required></textarea>

<button type="submit">
Send Message
</button>

</form>

<script>

document
.getElementById("contactForm")
.addEventListener("submit",function(e){

e.preventDefault();

alert("Your message has been sent successfully!");

this.reset();

});

</script>
